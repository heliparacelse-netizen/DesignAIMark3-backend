import { Router, Response } from "express";
import { requireAuth, AuthRequest } from "../middleware/auth";
import { uploadImage } from "../lib/cloudinary";
import OpenAI from "openai";

const router = Router();

// POST /api/analyze-room
router.post("/analyze-room", requireAuth, async (req: AuthRequest, res: Response) => {
  try {
    const { image } = req.body;
    if (!image) return res.status(400).json({ error: "Image is required" });

    if (!process.env.OPENAI_API_KEY) {
      return res.json({
        roomType: "Living Room",
        style: "Modern",
        dominantColors: ["#8B7355", "#F5F5F0", "#2C3E50"],
        lighting: "Natural daylight",
        suggestions: [
          "Add warm accent lighting to create ambiance",
          "Introduce plants to bring life to the space",
          "Consider a statement rug to anchor the seating area",
        ],
        score: 7,
        note: "Add OPENAI_API_KEY for real AI room analysis",
      });
    }

    // Upload image first
    const imageUrl = await uploadImage(image, "lumara/analysis");

    const openai = new OpenAI({ apiKey: process.env.OPENAI_API_KEY });

    const response = await openai.chat.completions.create({
      model: "gpt-4-vision-preview",
      max_tokens: 500,
      messages: [
        {
          role: "user",
          content: [
            {
              type: "image_url",
              image_url: { url: imageUrl },
            },
            {
              type: "text",
              text: `Analyze this interior room photo and respond ONLY with valid JSON:
{
  "roomType": "detected room type",
  "style": "detected style",
  "dominantColors": ["#hexcolor1", "#hexcolor2", "#hexcolor3"],
  "lighting": "description of lighting",
  "score": number from 1-10,
  "issues": ["issue 1", "issue 2"],
  "suggestions": ["suggestion 1", "suggestion 2", "suggestion 3"]
}`,
            },
          ],
        },
      ],
    });

    const content = response.choices[0]?.message?.content || "{}";
    const clean = content.replace(/```json|```/g, "").trim();
    const analysis = JSON.parse(clean);

    res.json(analysis);
  } catch (e: any) {
    res.status(500).json({ error: e.message });
  }
});

// POST /api/improve-prompt
router.post("/improve-prompt", requireAuth, async (req: AuthRequest, res: Response) => {
  try {
    const { prompt, style, roomType } = req.body;
    if (!prompt) return res.status(400).json({ error: "Prompt is required" });

    if (!process.env.OPENAI_API_KEY) {
      return res.json({
        improved: `Ultra realistic ${style || "modern"} ${roomType || "interior"}, ${prompt}, professional interior photography, natural lighting, high-end furniture, architectural digest style, 8k resolution`,
        note: "Add OPENAI_API_KEY for AI-powered prompt improvement",
      });
    }

    const openai = new OpenAI({ apiKey: process.env.OPENAI_API_KEY });

    const response = await openai.chat.completions.create({
      model: "gpt-3.5-turbo",
      max_tokens: 200,
      messages: [
        {
          role: "system",
          content: "You are an expert interior designer and AI prompt engineer. Improve the given interior design prompt to generate highly realistic renders. Make it detailed, specific about materials, lighting, and atmosphere. Keep it under 150 words. Return ONLY the improved prompt, nothing else.",
        },
        {
          role: "user",
          content: `Original prompt: "${prompt}"\nStyle: ${style || "Modern"}\nRoom type: ${roomType || "Living Room"}`,
        },
      ],
    });

    const improved = response.choices[0]?.message?.content || prompt;
    res.json({ improved, original: prompt });
  } catch (e: any) {
    res.status(500).json({ error: e.message });
  }
});

// POST /api/chat
router.post("/chat", requireAuth, async (req: AuthRequest, res: Response) => {
  try {
    const { messages } = req.body;

    if (!process.env.OPENAI_API_KEY) {
      return res.json({ reply: "Add OPENAI_API_KEY to Vercel/Render env vars to enable Lumara AI chat." });
    }

    const openai = new OpenAI({ apiKey: process.env.OPENAI_API_KEY });
    const response = await openai.chat.completions.create({
      model: "gpt-3.5-turbo",
      max_tokens: 400,
      messages: [
        {
          role: "system",
          content: "You are Lumara AI, an expert interior design assistant. Help users with room analysis, furniture suggestions, design prompts, style advice, and decoration trends. Be concise, practical, and inspiring.",
        },
        ...messages,
      ],
    });

    res.json({ reply: response.choices[0]?.message?.content || "Please try again." });
  } catch (e: any) {
    res.status(500).json({ error: e.message });
  }
});

export default router;
